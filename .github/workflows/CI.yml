name: CI

on:
  push:
  pull_request:

env:
  DOTNET_VERSION: '6.0.428'
  DOTNET_SDK_VERSION: '10.0.x'

jobs:
  buildAndTestWindows:

    runs-on:
    - windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # .NET 6 runtime for the FAKE build tool (net6.0); .NET 10 SDK for the net10.0 targets
        # and to satisfy global.json. Installed explicitly rather than relying on the runner image.
        dotnet-version: |
          ${{ env.DOTNET_VERSION }}
          ${{ env.DOTNET_SDK_VERSION }}
    - name: Build & Run Tests
      run: |
        .\build.cmd
    - name: Upload artifact (bin)
      uses: actions/upload-artifact@v4
      with:
        name: bin-windows
        path: bin
    - name: Upload artifact (dist)
      uses: actions/upload-artifact@v4
      with:
        name: dist-windows
        path: dist
        
  buildAndTestLinux:

    runs-on:
    - ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # .NET 6 runtime for the FAKE build tool (net6.0); .NET 10 SDK for the net10.0 targets
        # and to satisfy global.json. Installed explicitly rather than relying on the runner image.
        dotnet-version: |
          ${{ env.DOTNET_VERSION }}
          ${{ env.DOTNET_SDK_VERSION }}
    - name: Build & Run Tests
      run: |
        ./build.sh
    - name: Upload artifact (bin)
      uses: actions/upload-artifact@v4
      with:
        name: bin-linux
        path: bin
    - name: Upload artifact (dist)
      uses: actions/upload-artifact@v4
      with:
        name: dist-linux
        path: dist
        
  buildAndTestMac:

    runs-on:
    - macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # .NET 6 runtime for the FAKE build tool (net6.0); .NET 10 SDK for the net10.0 targets
        # and to satisfy global.json. Installed explicitly rather than relying on the runner image.
        dotnet-version: |
          ${{ env.DOTNET_VERSION }}
          ${{ env.DOTNET_SDK_VERSION }}
    - name: Build & Run Tests
      run: |
        ./build.sh
    - name: Upload artifact (bin)
      uses: actions/upload-artifact@v4
      with:
        name: bin-macos
        path: bin
    - name: Upload artifact (dist)
      uses: actions/upload-artifact@v4
      with:
        name: dist-macos
        path: dist
